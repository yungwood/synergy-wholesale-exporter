name: go

on:
  push:
    branches:
      - "*"
    paths:
      - go.mod
      - go.sum
      - "**/*.go"
      - "synergywholesaleapi/testdata/**"
  pull_request:
    paths:
      - go.mod
      - go.sum
      - "**/*.go"
      - "synergywholesaleapi/testdata/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Test
        run: go test ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

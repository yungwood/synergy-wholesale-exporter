name: golangci-lint

on:
  push:
    branches:
      - "*"
    paths:
      - go.mod
      - go.sum
      - "*.go"
  pull_request:
    paths:
      - go.mod
      - go.sum
      - "*.go"

permissions:
  contents: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
